openapi: 3.0.3
info:
  title: "ARGOS"
  description: "Backend API para gerenciamento de sinistros, vistorias, credenciados, cadastros e alertas. Desenvolvido para suportar o sistema de rastreamento e orquestração de vistoria de seguros."
  version: "1.0.0"
  contact:
    name: "Engenharia ARGOS"
    email: "dev@argos.local"
  license:
    name: "MIT"

servers:
  - url: "http://localhost:3001/api"
    description: "Development Server"
  - url: "https://api.argos.local"
    description: "Production Server"

tags:
  - name: "Authentication"
    description: "Endpoints de autenticação, login, logout e gestão de sessão"
  - name: "Perfil"
    description: "Endpoints de leitura e atualização do perfil do usuário autenticado"
  - name: "Configurações"
    description: "Endpoints de configurações do sistema e preferências de notificação"
  - name: "Dashboard"
    description: "KPIs, gráficos de severidade, métricas gerais e feeds"
  - name: "Sinistros"
    description: "CRUD de sinistros, movimento de estados (kanban), vinculação a vistorias"
  - name: "Vistorias"
    description: "CRUD de vistorias, laudos técnicos, áudios, imagens, PDFs"
  - name: "Cadastros"
    description: "Gestão de clientes, veículos e usuários do sistema"
  - name: "Credenciados"
    description: "CRUD de oficinas credenciadas, status, histórico, filtros"
  - name: "Alertas"
    description: "Listagem de alertas, marcação como lido, contadores por categoria"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT token obtido no login"

  responses:
    UnauthorizedError:
      description: "Não autenticado ou token inválido"
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Unauthorized"
              message:
                type: string
                example: "Token inválido ou expirado"

    ForbiddenError:
      description: "Autenticado mas sem permissão"
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Forbidden"
              message:
                type: string
                example: "Você não tem permissão para acessar este recurso"

    NotFoundError:
      description: "Recurso não encontrado"
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "NotFound"
              message:
                type: string
                example: "Recurso não encontrado"

    ValidationError:
      description: "Erros de validação nos dados enviados"
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "ValidationError"
              message:
                type: string
                example: "Dados inválidos"
              details:
                type: array
                items:
                  type: object
                  properties:
                    field:
                      type: string
                    message:
                      type: string

    ServerError:
      description: "Erro interno do servidor"
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "InternalServerError"
              message:
                type: string
                example: "Erro ao processar a solicitação"

  schemas:
    # ============= AUTHENTICATION SCHEMAS =============
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "admin@argos.local"
        password:
          type: string
          format: password
          example: "senha123"

    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
        tokens:
          $ref: "#/components/schemas/AuthTokens"

    AuthTokens:
      type: object
      properties:
        accessToken:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        refreshToken:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        expiresIn:
          type: number
          example: 3600

    AuthUser:
      type: object
      properties:
        id:
          type: string
          example: "user-001"
        email:
          type: string
          example: "admin@argos.local"
        name:
          type: string
          example: "Admin User"
        role:
          type: string
          enum: ["admin", "operator", "viewer"]
          example: "admin"
        createdAt:
          type: string
          format: date-time

    RefreshTokenRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

    User:
      type: object
      properties:
        id:
          type: string
          example: "user-001"
        email:
          type: string
          example: "admin@argos.local"
        name:
          type: string
          example: "Admin User"
        role:
          type: string
          enum: ["admin", "operator", "viewer"]
          example: "admin"
        createdAt:
          type: string
          format: date-time

    # ============= DASHBOARD SCHEMAS =============
    KPICard:
      type: object
      properties:
        id:
          type: string
          example: "kpi-001"
        titulo:
          type: string
          example: "Total de Sinistros"
        valor:
          type: number
          example: 152
        trend:
          type: string
          enum: ["up", "down", "stable"]
          example: "up"
        percentualMes:
          type: number
          example: 8.5
        descricao:
          type: string
          example: "Aumento de 8.5% em relação ao mês anterior"

    SeverityChartData:
      type: object
      properties:
        severity:
          type: string
          enum: ["crítica", "alta", "média", "baixa"]
          example: "crítica"
        count:
          type: number
          example: 34
        percentage:
          type: number
          example: 22.4

    AlertFeedItem:
      type: object
      properties:
        id:
          type: string
          example: "alerta-001"
        tipo:
          type: string
          enum:
            [
              "sinistro_criado",
              "status_alterado",
              "vistoria_marcada",
              "documentacao",
            ]
          example: "status_alterado"
        titulo:
          type: string
          example: "Sinistro SIN-2024-001 mudou para 'Aguardando Vistoria'"
        timestamp:
          type: string
          format: date-time
        lido:
          type: boolean
          example: false

    RecentClaimRow:
      type: object
      properties:
        id:
          type: string
          example: "SIN-2024-152"
        cliente:
          type: string
          example: "João Silva"
        veiculo:
          type: string
          example: "Honda Civic 2020"
        status:
          type: string
          enum:
            [
              "novo",
              "aguardando_vistoria",
              "vistoria_agendada",
              "vistoria_realizada",
              "laudo_pendente",
              "laudo_concluido",
              "pago",
              "negado",
            ]
          example: "aguardando_vistoria"
        dataAbertura:
          type: string
          format: date-time
        valor:
          type: number
          example: 8500.00

    # ============= SINISTROS SCHEMAS =============
    SinistroCreateRequest:
      type: object
      required:
        - cliente
        - veiculo
        - placa
        - descricao
        - valor_estimado
      properties:
        cliente:
          type: string
          example: "João Silva"
        veiculo:
          type: string
          example: "Honda Civic 2020"
        placa:
          type: string
          example: "ABC-1234"
        descricao:
          type: string
          example: "Colisão frontal em semáforo"
        valor_estimado:
          type: number
          example: 8500.00
        data_sinistro:
          type: string
          format: date-time

    SinistroUpdateRequest:
      type: object
      properties:
        cliente:
          type: string
        veiculo:
          type: string
        placa:
          type: string
        descricao:
          type: string
        valor_estimado:
          type: number
        status:
          type: string
          enum:
            [
              "novo",
              "aguardando_vistoria",
              "vistoria_agendada",
              "vistoria_realizada",
              "laudo_pendente",
              "laudo_concluido",
              "pago",
              "negado",
            ]

    Sinistro:
      type: object
      properties:
        id:
          type: string
          example: "SIN-2024-152"
        cliente:
          type: string
          example: "João Silva"
        veiculo:
          type: string
          example: "Honda Civic 2020"
        placa:
          type: string
          example: "ABC-1234"
        descricao:
          type: string
          example: "Colisão frontal em semáforo"
        valor_estimado:
          type: number
          example: 8500.00
        status:
          type: string
          enum:
            [
              "novo",
              "aguardando_vistoria",
              "vistoria_agendada",
              "vistoria_realizada",
              "laudo_pendente",
              "laudo_concluido",
              "pago",
              "negado",
            ]
          example: "aguardando_vistoria"
        data_abertura:
          type: string
          format: date-time
        credenciado:
          type: string
          description: "Nome do credenciado vinculado (opcional)"
          example: "Oficina Silva & Cia"
          nullable: true
        statusVistoria:
          type: string
          description: "Status da vistoria (opcional)"
          enum: ["nao_iniciada", "em_progresso", "concluida"]
          example: "nao_iniciada"
          nullable: true
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/SinistroTimelineEntry"

    SinistroTimelineEntry:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        evento:
          type: string
          example: "Status alterado para 'Aguardando Vistoria'"
        autor:
          type: string
          example: "Admin User"

    SinistroMoveRequest:
      type: object
      required:
        - status_destino
      properties:
        status_destino:
          type: string
          enum:
            [
              "novo",
              "aguardando_vistoria",
              "vistoria_agendada",
              "vistoria_realizada",
              "laudo_pendente",
              "laudo_concluido",
              "pago",
              "negado",
            ]
          example: "vistoria_agendada"
        observacao:
          type: string
          description: "Observação opcional sobre movementation"
          example: "Agendada para próxima segunda"

    # ============= VISTORIAS SCHEMAS =============
    VistoriaCreateRequest:
      type: object
      required:
        - sinistro_id
        - credenciado
        - data_vistoria
      properties:
        sinistro_id:
          type: string
          example: "SIN-2024-152"
        credenciado:
          type: string
          example: "Oficina Silva & Cia"
        data_vistoria:
          type: string
          format: date-time
        observacoes:
          type: string
          example: "Vistoria agendada com sucesso"

    VistoriaUpdateRequest:
      type: object
      properties:
        status:
          type: string
          enum: ["nao_iniciada", "em_progresso", "concluida"]
        laudo:
          type: string
          description: "Texto técnico do laudo"
        pdfLaudoUrl:
          type: string
          format: uri
          description: "URL do PDF do laudo"
        observacoes:
          type: string

    Vistoria:
      type: object
      properties:
        id:
          type: string
          example: "VST-2024-001"
        sinistro_id:
          type: string
          example: "SIN-2024-152"
        veiculo:
          type: string
          example: "Honda Civic 2020"
        placa:
          type: string
          example: "ABC-1234"
        credenciado:
          type: string
          example: "Oficina Silva & Cia"
        status:
          type: string
          enum: ["nao_iniciada", "em_progresso", "concluida"]
          example: "em_progresso"
        data_vistoria:
          type: string
          format: date-time
        laudo:
          type: string
          nullable: true
          description: "Texto técnico do laudo"
          example: "O veículo apresenta dano em paralama frontal esquerdo..."
        pdfLaudoUrl:
          type: string
          format: uri
          nullable: true
          description: "URL do PDF do laudo"
          example: "https://api.argos.local/files/laudos/VST-2024-001.pdf"
        audios:
          type: array
          items:
            $ref: "#/components/schemas/VistoriaAudio"
        imagens:
          type: array
          items:
            $ref: "#/components/schemas/VistoriaImagem"
        observacoes:
          type: string
          nullable: true

    VistoriaAudio:
      type: object
      properties:
        id:
          type: string
          example: "audio-001"
        url:
          type: string
          format: uri
          example: "https://api.argos.local/files/audios/VST-2024-001-audio-1.mp3"
        duracao_segundos:
          type: number
          example: 45
        transcricao:
          type: string
          example: "Vistoria realizada no local do sinistro, constatado dano em..."

    VistoriaImagem:
      type: object
      properties:
        id:
          type: string
          example: "img-001"
        url:
          type: string
          format: uri
          example: "https://api.argos.local/files/imagens/VST-2024-001-img-1.jpg"
        descricao:
          type: string
          example: "Dano frontal esquerdo"

    VistoriaLinkRequest:
      type: object
      required:
        - sinistro_id
        - credenciado
      properties:
        sinistro_id:
          type: string
          example: "SIN-2024-152"
        credenciado:
          type: string
          example: "Oficina Silva & Cia"
        status:
          type: string
          enum: ["nao_iniciada", "em_progresso", "concluida"]
          example: "nao_iniciada"

    # ============= CADASTROS SCHEMAS =============
    ClienteCreateRequest:
      type: object
      required:
        - nome
        - cpf_cnpj
        - email
      properties:
        nome:
          type: string
          example: "João Silva"
        cpf_cnpj:
          type: string
          example: "123.456.789-00"
        email:
          type: string
          format: email
          example: "joao@example.com"
        telefone:
          type: string
          example: "(11) 9999-8888"
        endereco:
          type: string
          example: "Rua A, 123"

    Cliente:
      type: object
      properties:
        id:
          type: string
          example: "cli-001"
        nome:
          type: string
        cpf_cnpj:
          type: string
        email:
          type: string
          format: email
        telefone:
          type: string
          nullable: true
        endereco:
          type: string
          nullable: true
        data_cadastro:
          type: string
          format: date-time
        sinistros_count:
          type: number
          example: 5

    VeiculoCreateRequest:
      type: object
      required:
        - cliente_id
        - placa
        - marca
        - modelo
        - ano
      properties:
        cliente_id:
          type: string
          example: "cli-001"
        placa:
          type: string
          example: "ABC-1234"
        marca:
          type: string
          example: "Honda"
        modelo:
          type: string
          example: "Civic"
        ano:
          type: number
          example: 2020
        chassi:
          type: string
          example: "9BWHE21JX24000000"

    Veiculo:
      type: object
      properties:
        id:
          type: string
          example: "vei-001"
        cliente_id:
          type: string
        placa:
          type: string
        marca:
          type: string
        modelo:
          type: string
        ano:
          type: number
        chassi:
          type: string
          nullable: true
        data_cadastro:
          type: string
          format: date-time

    UsuarioCreateRequest:
      type: object
      required:
        - nome
        - email
        - password
        - role
      properties:
        nome:
          type: string
          example: "Maria Operator"
        email:
          type: string
          format: email
          example: "maria@argos.local"
        password:
          type: string
          format: password
          example: "senhaSegura123"
        role:
          type: string
          enum: ["admin", "operator", "viewer"]
          example: "operator"

    UsuarioUpdateRequest:
      type: object
      properties:
        nome:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: ["admin", "operator", "viewer"]

    Usuario:
      type: object
      properties:
        id:
          type: string
          example: "usr-001"
        nome:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: ["admin", "operator", "viewer"]
        ativo:
          type: boolean
          example: true
        data_cadastro:
          type: string
          format: date-time

    # ============= CREDENCIADOS SCHEMAS =============
    CredenciadoCreateRequest:
      type: object
      required:
        - name
        - cnpj
        - email
        - telefone
      properties:
        name:
          type: string
          example: "Oficina Silva & Cia"
        cnpj:
          type: string
          example: "12.345.678/0001-90"
        email:
          type: string
          format: email
          example: "contato@oficina-silva.com"
        telefone:
          type: string
          example: "(11) 3333-4444"

    CredenciadoUpdateRequest:
      type: object
      properties:
        name:
          type: string
        cnpj:
          type: string
        email:
          type: string
          format: email
        telefone:
          type: string
        status:
          type: string
          enum: ["ativo", "suspenso", "inativo"]

    Credenciado:
      type: object
      properties:
        id:
          type: string
          example: "cred-001"
        name:
          type: string
          example: "Oficina Silva & Cia"
        cnpj:
          type: string
          example: "12.345.678/0001-90"
        email:
          type: string
          format: email
        telefone:
          type: string
        status:
          type: string
          enum: ["ativo", "suspenso", "inativo"]
          example: "ativo"
        quality_score:
          type: number
          description: "Pontuação de qualidade (0-100)"
          example: 92.5
        vistorias_realizadas:
          type: number
          example: 156
        data_cadastro:
          type: string
          format: date-time

    CredenciadoHistorico:
      type: object
      properties:
        id:
          type: string
          example: "hist-001"
        credenciado_id:
          type: string
        data:
          type: string
          format: date-time
        evento:
          type: string
          enum: ["status_mudanca", "qualidade_atualizada", "vistoria_concluida"]
          example: "status_mudanca"
        detalhes:
          type: object
          example:
            status_anterior: "ativo"
            status_novo: "suspenso"
            motivo: "Falha em vistoria"

    # ============= ALERTAS SCHEMAS =============
    Alerta:
      type: object
      properties:
        id:
          type: string
          example: "alerta-001"
        tipo:
          type: string
          enum:
            [
              "sinistro_criado",
              "status_alterado",
              "vistoria_marcada",
              "documentacao",
              "qualidade",
              "sistema",
            ]
          example: "status_alterado"
        categoria:
          type: string
          enum: ["critica", "alta", "media", "baixa"]
          example: "alta"
        titulo:
          type: string
          example: "Sinistro SIN-2024-152 aguardando vistoria"
        descricao:
          type: string
          example: "O sinistro foi criado há 2 dias sem agendamento de vistoria"
        lido:
          type: boolean
          example: false
        timestamp:
          type: string
          format: date-time
        referencia_id:
          type: string
          description: "ID do recurso relacionado (sinistro, vistoria, etc)"
          example: "SIN-2024-152"

paths:
  # ============= AUTHENTICATION PATHS =============
  /auth/login:
    post:
      tags:
        - Authentication
      summary: "Autenticar usuário com email e senha"
      description: "Realiza login e retorna tokens de acesso e refresh"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: "Login realizado com sucesso"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/ServerError"

  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: "Renovar token de acesso"
      description: "Usa refresh token para obter novo access token"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: "Token renovado com sucesso"
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens:
                    $ref: "#/components/schemas/AuthTokens"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/ServerError"

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: "Fazer logout"
      description: "Invalida sessão do usuário"
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: "Logout realizado com sucesso"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/ServerError"

  /auth/me:
    get:
      tags:
        - Authentication
      summary: "Obter dados do usuário autenticado"
      description: "Retorna informações do usuário logado"
      security:
        - BearerAuth: []
      responses:
        "200":
          description: "Dados do usuário retornados com sucesso"
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/AuthUser"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/ServerError"

  /perfil:
    get:
      tags:
        - Perfil
      summary: "Obter dados do meu perfil"
      description: "Retorna dados do usuário autenticado para tela Meu Perfil"
      security:
        - BearerAuth: []
      responses:
        "200":
          description: "Perfil retornado com sucesso"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: string
                    example: "Perfil"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/ServerError"

    put:
      tags:
        - Perfil
      summary: "Atualizar meu perfil"
      description: "Atualiza dados do usuário autenticado na tela Meu Perfil"
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
