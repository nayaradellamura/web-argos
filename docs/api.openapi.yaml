  /alertas/{id}/marcar-lido:
    patch:
      tags:
        - Alertas
      summary: "Marcar alerta como lido"
      description: "Marca um alerta específico como lido"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                lido:
                  type: boolean
                  example: true
      responses:
        "200":
          description: "Alerta marcado como lido"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: string
                    example: "Alerta"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/ServerError"

  /alertas/marcar-lidos:
    patch:
      tags:
        - Alertas
      summary: "Marcar lote como lido"
      description: "Marca múltiplos alertas como lidos"
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ids
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  example: ["ALT-001", "ALT-002"]
      responses:
        "200":
          description: "Lote atualizado com sucesso"
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: number
                    example: 2
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/ServerError"

  /alertas/counts:
    get:
      tags:
        - Alertas
